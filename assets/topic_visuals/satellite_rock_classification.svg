<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Rock classification from satellite variables</title>
  <desc id="desc">A diagram showing satellite and GIS variables feeding a classifier to produce reviewed rock type maps.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#0b1f3a"/>
    </marker>
  </defs>
  <rect width="980" height="560" rx="28" fill="#f5f1e8"/>
  <text x="56" y="66" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="27" font-weight="800">Rock types from satellite variables</text>
  <text x="58" y="98" fill="#475569" font-family="Arial, sans-serif" font-size="15">The source story is ADV GIS and critical-minerals visuals, not a geochemical black box.</text>

  <g transform="translate(62 142)">
    <rect width="246" height="286" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="42" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Satellite / GIS variables</text>
    <g font-family="Arial, sans-serif" font-size="13" font-weight="800">
      <rect x="28" y="72" width="82" height="28" rx="14" fill="#7ed6df"/><text x="47" y="91" fill="#0b1f3a">bands</text>
      <rect x="124" y="72" width="82" height="28" rx="14" fill="#f28c28"/><text x="151" y="91" fill="#0b1f3a">DEM</text>
      <rect x="28" y="116" width="82" height="28" rx="14" fill="#bfdbfe"/><text x="45" y="135" fill="#0b1f3a">slope</text>
      <rect x="124" y="116" width="82" height="28" rx="14" fill="#dbeafe"/><text x="143" y="135" fill="#0b1f3a">texture</text>
      <rect x="28" y="160" width="82" height="28" rx="14" fill="#fde68a"/><text x="41" y="179" fill="#0b1f3a">linears</text>
      <rect x="124" y="160" width="82" height="28" rx="14" fill="#e2e8f0"/><text x="141" y="179" fill="#0b1f3a">context</text>
    </g>
    <path d="M38 232h164M38 252h132" stroke="#0b1f3a" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
  </g>

  <g stroke="#0b1f3a" stroke-width="3.5" marker-end="url(#arrow)" fill="none">
    <path d="M324 286h116"/>
    <path d="M590 286h106"/>
  </g>

  <g transform="translate(450 178)">
    <rect width="132" height="216" rx="18" fill="#0b1f3a"/>
    <text x="31" y="48" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="800">AI</text>
    <text x="25" y="78" fill="#bfeff3" font-family="Arial, sans-serif" font-size="13">feature</text>
    <text x="25" y="102" fill="#bfeff3" font-family="Arial, sans-serif" font-size="13">selection</text>
    <text x="25" y="126" fill="#bfeff3" font-family="Arial, sans-serif" font-size="13">classifier</text>
    <text x="25" y="150" fill="#bfeff3" font-family="Arial, sans-serif" font-size="13">uncertainty</text>
    <rect x="28" y="174" width="76" height="18" rx="9" fill="#f28c28"/>
  </g>

  <g transform="translate(704 132)">
    <rect width="222" height="308" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="42" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Reviewed map</text>
    <g transform="translate(28 68)">
      <rect width="166" height="166" fill="#e2e8f0"/>
      <rect x="0" y="0" width="55" height="55" fill="#7ed6df"/>
      <rect x="55" y="0" width="55" height="55" fill="#f28c28"/>
      <rect x="110" y="0" width="56" height="55" fill="#dbeafe"/>
      <rect x="0" y="55" width="55" height="55" fill="#f28c28"/>
      <rect x="55" y="55" width="55" height="55" fill="#7ed6df"/>
      <rect x="110" y="55" width="56" height="55" fill="#94a3b8"/>
      <rect x="0" y="110" width="55" height="56" fill="#dbeafe"/>
      <rect x="55" y="110" width="55" height="56" fill="#94a3b8"/>
      <rect x="110" y="110" width="56" height="56" fill="#7ed6df"/>
    </g>
    <text x="28" y="266" fill="#536171" font-family="Arial, sans-serif" font-size="13">classes, confidence, false positives</text>
  </g>

  <rect x="132" y="486" width="716" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="210" y="508" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="14" font-weight="800">Heatmaps and spider diagrams explain complexity; labels still need review.</text>
</svg>
