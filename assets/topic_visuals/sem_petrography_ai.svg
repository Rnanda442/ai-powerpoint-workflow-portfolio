<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SEM petrography AI classification</title>
  <desc id="desc">SEM textures and mineral forms are labeled, compared with environmental context, and reviewed as paleoclimate proxies.</desc>
  <rect width="1200" height="675" fill="#101820"/>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues=".18 .38"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect x="65" y="150" width="510" height="395" rx="18" fill="#e5e7eb"/>
  <rect x="90" y="178" width="460" height="315" rx="10" fill="#111827"/>
  <rect x="90" y="178" width="460" height="315" rx="10" filter="url(#grain)"/>
  <g fill="none" stroke-width="4" opacity=".85">
    <path d="M150 250c55-52 120-20 160 10s103 20 160-34" stroke="#f8fafc"/>
    <path d="M160 375c70-55 130-30 205 0s110 30 155-12" stroke="#94a3b8"/>
    <path d="M250 205c20 70-8 125-60 168" stroke="#cbd5e1"/>
  </g>
  <g fill="#f97316">
    <circle cx="215" cy="282" r="9"/><circle cx="358" cy="345" r="9"/><circle cx="440" cy="250" r="9"/>
  </g>
  <g fill="#fff" font-family="Arial, sans-serif">
    <text x="70" y="82" font-size="44" font-weight="800">SEM Petrography To Climate Signal</text>
    <text x="70" y="126" font-size="22">texture labels + mineral form + geologic context -> expert-reviewed proxy</text>
  </g>
  <g transform="translate(660 155)" font-family="Arial, sans-serif">
    <rect width="440" height="390" rx="20" fill="#f8fafc"/>
    <text x="28" y="52" font-size="26" font-weight="800" fill="#0f172a">CLASSIFY, THEN QUESTION</text>
    <g font-size="21" font-weight="700">
      <rect x="30" y="86" width="380" height="52" rx="12" fill="#dbeafe"/><text x="52" y="120" fill="#1e3a8a">detrital or authigenic?</text>
      <rect x="30" y="158" width="380" height="52" rx="12" fill="#ccfbf1"/><text x="52" y="192" fill="#134e4a">blocky / vermicular / booklet?</text>
      <rect x="30" y="230" width="380" height="52" rx="12" fill="#ffedd5"/><text x="52" y="264" fill="#9a3412">weathering and acidity signal?</text>
      <rect x="30" y="302" width="380" height="52" rx="12" fill="#fee2e2"/><text x="52" y="336" fill="#991b1b">human petrography review</text>
    </g>
  </g>
  <text x="100" y="528" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">SEM FIELD OF VIEW</text>
</svg>
