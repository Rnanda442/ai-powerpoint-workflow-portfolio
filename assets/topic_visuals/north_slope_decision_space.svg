<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="North Slope public data to energy screening decision space">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="basin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.38" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="42" fill="url(#sky)"/>
  <path d="M120 430c132-88 264-96 396-35 128 59 228 60 350 0 75-37 143-45 214-8v188H120z" fill="url(#basin)" opacity="0.9"/>
  <g fill="none" stroke="#fde68a" stroke-width="4" opacity="0.75">
    <path d="M140 470c150-72 278-80 412-27 117 46 216 44 339-8 78-33 139-34 197-6"/>
    <path d="M140 522c166-52 303-56 422-13 119 42 221 40 342-7 69-26 127-25 184 0"/>
  </g>
  <g stroke="#e0f2fe" stroke-width="5" filter="url(#glow)">
    <path d="M318 210v318"/>
    <path d="M522 180v366"/>
    <path d="M758 240v292"/>
  </g>
  <g fill="#2dd4bf" filter="url(#glow)">
    <circle cx="318" cy="392" r="13"/>
    <circle cx="522" cy="345" r="13"/>
    <circle cx="758" cy="470" r="13"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="95" y="110" fill="#f8fafc" font-size="36" font-weight="800">North Slope screening workflow</text>
    <text x="96" y="150" fill="#cbd5e1" font-size="19">public reports + maps + wells + structural context -> reviewable hydrate target queue</text>
  </g>
  <g transform="translate(830 142)" font-family="Inter, Arial, sans-serif">
    <rect width="270" height="330" rx="28" fill="rgba(15,23,42,0.78)" stroke="#2dd4bf"/>
