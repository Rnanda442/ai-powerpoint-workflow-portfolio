    <text x="28" y="98" fill="#cbd5e1" font-size="18">1. provenance confidence</text>
    <text x="28" y="135" fill="#cbd5e1" font-size="18">2. stratigraphic context</text>
    <text x="28" y="172" fill="#cbd5e1" font-size="18">3. well-log features</text>
    <text x="28" y="209" fill="#cbd5e1" font-size="18">4. structural risk</text>
    <rect x="28" y="248" width="214" height="46" rx="18" fill="#0f766e"/>
