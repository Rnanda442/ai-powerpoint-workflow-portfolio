<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">North Slope gas hydrate ML architecture</title>
  <desc id="desc">A diagram showing gas hydrate well-log inputs, feature separation, model families, complete-well validation, and leakage controls.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#0b1f3a"/>
    </marker>
  </defs>
  <rect width="980" height="560" rx="28" fill="#f8fafc"/>
  <text x="56" y="66" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="27" font-weight="800">Gas hydrate ML architecture</text>
  <text x="58" y="98" fill="#475569" font-family="Arial, sans-serif" font-size="15">The website shows the scaffold: public-safe variables, leakage gates, and complete-well validation.</text>

  <g transform="translate(48 132)">
    <rect width="238" height="310" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="26" y="42" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Inputs</text>
    <text x="26" y="72" fill="#f28c28" font-family="Arial, sans-serif" font-size="13" font-weight="800">depth stays raw</text>
    <text x="26" y="99" fill="#536171" font-family="Arial, sans-serif" font-size="13">location</text>
    <text x="26" y="126" fill="#536171" font-family="Arial, sans-serif" font-size="13">gamma ray, density, porosity</text>
    <text x="26" y="153" fill="#536171" font-family="Arial, sans-serif" font-size="13">resistivity, caliper, NMR</text>
    <text x="26" y="180" fill="#536171" font-family="Arial, sans-serif" font-size="13">Vp, Vs, Vp/Vs, impedance</text>
    <text x="26" y="207" fill="#536171" font-family="Arial, sans-serif" font-size="13">core porosity/permeability</text>
    <rect x="26" y="238" width="178" height="36" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="48" y="261" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="13" font-weight="800">other logs normalized</text>
  </g>

  <g stroke="#0b1f3a" stroke-width="3.2" marker-end="url(#arrow)" fill="none">
    <path d="M300 286h76"/>
    <path d="M558 286h78"/>
    <path d="M812 286h70"/>
  </g>

  <g transform="translate(388 136)">
    <rect width="158" height="306" rx="18" fill="#0b1f3a"/>
    <text x="28" y="44" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="800">Feature lanes</text>
    <rect x="24" y="76" width="110" height="36" rx="18" fill="#7ed6df"/>
    <text x="42" y="99" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="13" font-weight="800">measured</text>
    <rect x="24" y="132" width="110" height="36" rx="18" fill="#f28c28"/>
    <text x="46" y="155" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="13" font-weight="800">derived</text>
    <rect x="24" y="188" width="110" height="36" rx="18" fill="#ffffff"/>
    <text x="59" y="211" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="13" font-weight="800">QC</text>
    <rect x="24" y="244" width="110" height="36" rx="18" fill="#fecdd3"/>
    <text x="44" y="267" fill="#991b1b" font-family="Arial, sans-serif" font-size="13" font-weight="800">targets</text>
  </g>

  <g transform="translate(648 128)">
    <rect width="150" height="320" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="27" y="42" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Models</text>
    <rect x="24" y="72" width="102" height="46" rx="12" fill="#e7f7f8"/>
    <text x="44" y="100" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="13" font-weight="800">baseline</text>
    <rect x="24" y="136" width="102" height="46" rx="12" fill="#fff7ed"/>
    <text x="38" y="164" fill="#9a3412" font-family="Arial, sans-serif" font-size="13" font-weight="800">classifier</text>
    <rect x="24" y="200" width="102" height="46" rx="12" fill="#eff6ff"/>
    <text x="40" y="228" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="13" font-weight="800">regressor</text>
    <rect x="24" y="264" width="102" height="32" rx="16" fill="#0b1f3a"/>
    <text x="54" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="800">ANN</text>
  </g>

  <g transform="translate(888 158)">
    <rect width="64" height="252" rx="18" fill="#fff1f2" stroke="#fecdd3"/>
    <text transform="translate(24 218) rotate(-90)" fill="#991b1b" font-family="Arial, sans-serif" font-size="15" font-weight="900">held-out complete wells</text>
  </g>

  <rect x="118" y="486" width="744" height="34" rx="17" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="154" y="508" fill="#9a3412" font-family="Arial, sans-serif" font-size="14" font-weight="800">Rule: separate measured inputs, derived features, QC flags, and targets before any model score is trusted.</text>
</svg>
