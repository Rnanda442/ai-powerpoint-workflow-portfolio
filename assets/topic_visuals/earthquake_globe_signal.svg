<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Processing earthquake globe signal sketch">
  <defs>
    <radialGradient id="planet" cx="46%" cy="42%" r="62%">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.45" stop-color="#075985"/>
      <stop offset="0.76" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="42" fill="#020617"/>
  <circle cx="430" cy="350" r="245" fill="url(#planet)" stroke="#38bdf8" stroke-width="2"/>
  <g fill="none" stroke="#67e8f9" opacity="0.24">
    <ellipse cx="430" cy="350" rx="245" ry="72"/>
    <ellipse cx="430" cy="350" rx="210" ry="245"/>
    <ellipse cx="430" cy="350" rx="115" ry="245"/>
    <path d="M208 250c128 52 273 58 445 8M210 455c150-48 300-50 440 2"/>
  </g>
  <g filter="url(#softGlow)">
    <circle cx="302" cy="310" r="12" fill="#f97316"/>
    <circle cx="302" cy="310" r="44" fill="none" stroke="#f97316" stroke-width="4" opacity="0.65"/>
    <circle cx="516" cy="410" r="9" fill="#facc15"/>
    <circle cx="516" cy="410" r="34" fill="none" stroke="#facc15" stroke-width="3" opacity="0.55"/>
    <circle cx="482" cy="245" r="7" fill="#2dd4bf"/>
    <circle cx="482" cy="245" r="25" fill="none" stroke="#2dd4bf" stroke-width="3" opacity="0.55"/>
    <circle cx="602" cy="330" r="6" fill="#38bdf8"/>
  </g>
  <path d="M715 220c38 28 44 68 0 96s-40 67 4 94 44 65-4 101" fill="none" stroke="url(#line)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)"/>
  <g transform="translate(790 145)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="0" fill="#f8fafc" font-size="34" font-weight="800">USGS events</text>
    <text x="0" y="42" fill="#cbd5e1" font-size="20">magnitude -> pulse size</text>
    <text x="0" y="74" fill="#cbd5e1" font-size="20">depth -> color</text>
    <text x="0" y="106" fill="#cbd5e1" font-size="20">time -> orbit + sound</text>
  </g>
  <g transform="translate(790 405)" fill="#0f172a" stroke="#334155">
    <rect width="285" height="108" rx="22"/>
    <path d="M28 68c22-34 39-34 61 0s39 34 61 0 39-34 61 0" fill="none" stroke="#38bdf8" stroke-width="5"/>
    <text x="28" y="38" fill="#f8fafc" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">sonification sketch</text>
  </g>
</svg>
