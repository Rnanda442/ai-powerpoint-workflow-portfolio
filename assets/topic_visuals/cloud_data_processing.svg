<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Large data processing streamlined with AI</title>
  <desc id="desc">A diagram showing phone access to Codex, GitHub, cloud compute, and large scientific datasets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f1e8"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#0b1f3a"/>
    </marker>
  </defs>
  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="56" y="66" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="27" font-weight="800">AI streamlines large data processing</text>
  <text x="58" y="98" fill="#475569" font-family="Arial, sans-serif" font-size="15">The AI advance is access: Codex can work inside cloud/virtual computers while GitHub keeps the project shared.</text>

  <g transform="translate(70 154)">
    <rect x="0" y="0" width="118" height="220" rx="28" fill="#0b1f3a"/>
    <rect x="13" y="28" width="92" height="158" rx="12" fill="#ffffff"/>
    <text x="34" y="92" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Codex</text>
    <text x="28" y="120" fill="#536171" font-family="Arial, sans-serif" font-size="12">from phone</text>
    <circle cx="59" cy="201" r="8" fill="#7ed6df"/>
  </g>

  <g stroke="#0b1f3a" stroke-width="3.5" marker-end="url(#arrow)" fill="none">
    <path d="M202 264h96"/>
    <path d="M452 264h98"/>
    <path d="M704 264h92"/>
  </g>

  <g transform="translate(314 168)">
    <rect width="128" height="192" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="64" cy="68" r="34" fill="#0b1f3a"/>
    <path d="M44 68h40M64 48v40" stroke="#7ed6df" stroke-width="7" stroke-linecap="round"/>
    <text x="35" y="128" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">GitHub</text>
    <text x="23" y="155" fill="#536171" font-family="Arial, sans-serif" font-size="12">commit, push, review</text>
  </g>

  <g transform="translate(568 134)">
    <path d="M78 70c16-38 78-31 88 8 36-6 62 18 62 48 0 34-27 54-64 54H48c-34 0-58-21-58-52 0-29 22-50 52-50 8 0 21 2 36 8z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="34" y="120" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Cloud compute</text>
    <text x="22" y="148" fill="#536171" font-family="Arial, sans-serif" font-size="12">OSL / ASF / virtual machines</text>
    <rect x="18" y="206" width="198" height="66" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="38" y="233" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="13" font-weight="800">process while away</text>
    <text x="38" y="255" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="13">logs + artifacts stay tracked</text>
  </g>

  <g transform="translate(812 156)">
    <rect width="110" height="216" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="18" y="28" width="74" height="26" rx="7" fill="#7ed6df"/>
    <rect x="18" y="72" width="74" height="26" rx="7" fill="#f28c28"/>
    <rect x="18" y="116" width="74" height="26" rx="7" fill="#0b1f3a"/>
    <rect x="18" y="160" width="74" height="26" rx="7" fill="#bfdbfe"/>
    <text x="22" y="206" fill="#536171" font-family="Arial, sans-serif" font-size="12">big datasets</text>
  </g>

  <rect x="136" y="472" width="708" height="42" rx="21" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="176" y="498" fill="#9a3412" font-family="Arial, sans-serif" font-size="14" font-weight="800">Less waiting at a laptop: process, commit, push, and collaborate from anywhere.</text>
</svg>
