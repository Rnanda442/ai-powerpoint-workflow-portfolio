<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">AI knowledge graph and diagram architecture</title>
  <desc id="desc">A diagram where tables, questions, and drawings feed AI/ML, which outputs knowledge graphs, model diagrams, and visual scientific explanations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#0b1f3a"/>
    </marker>
  </defs>
  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="52" y="62" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="26" font-weight="800">AI-built diagrams explain project architecture</text>
  <text x="54" y="94" fill="#4b5563" font-family="Arial, sans-serif" font-size="15">AI converts scattered inputs into structures people can inspect.</text>

  <g>
    <rect x="58" y="138" width="250" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="82" y="168" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Tables / CSVs</text>
    <text x="82" y="193" fill="#536171" font-family="Arial, sans-serif" font-size="13">many inputs, fields, evidence rows</text>
    <rect x="58" y="244" width="250" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="82" y="274" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Questions / projects</text>
    <text x="82" y="299" fill="#536171" font-family="Arial, sans-serif" font-size="13">variables that relate to each other</text>
    <rect x="58" y="350" width="250" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="82" y="380" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Drawings / ideas</text>
    <text x="82" y="405" fill="#536171" font-family="Arial, sans-serif" font-size="13">shapes, colors, polygons, field context</text>
  </g>

  <g>
    <circle cx="490" cy="283" r="104" fill="#0b1f3a"/>
    <circle cx="490" cy="283" r="72" fill="#102f57" stroke="#7ed6df" stroke-width="4"/>
    <text x="443" y="276" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="900">AI / ML</text>
    <text x="418" y="307" fill="#bfeff3" font-family="Arial, sans-serif" font-size="14">sort, connect, draw, validate</text>
  </g>

  <g stroke="#0b1f3a" stroke-width="3.5" marker-end="url(#arrow)" fill="none">
    <path d="M310 177 C366 177 384 232 397 261"/>
    <path d="M310 283h66"/>
    <path d="M310 389 C366 389 384 334 397 305"/>
    <path d="M593 261 C616 226 646 177 688 177"/>
    <path d="M594 283h77"/>
    <path d="M593 305 C616 340 646 389 688 389"/>
  </g>

  <g>
    <rect x="688" y="138" width="236" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="712" y="168" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Knowledge graph</text>
    <text x="712" y="193" fill="#536171" font-family="Arial, sans-serif" font-size="13">variables connect with evidence</text>
    <rect x="688" y="244" width="236" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="712" y="274" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">ML architecture</text>
    <text x="712" y="299" fill="#536171" font-family="Arial, sans-serif" font-size="13">inputs, model, validation gates</text>
    <rect x="688" y="350" width="236" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="712" y="380" fill="#0b1f3a" font-family="Arial, sans-serif" font-size="17" font-weight="800">Scientific drawing</text>
    <text x="712" y="405" fill="#536171" font-family="Arial, sans-serif" font-size="13">environment + question in one view</text>
  </g>

  <g>
    <rect x="86" y="472" width="808" height="40" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="188" y="497" fill="#9a3412" font-family="Arial, sans-serif" font-size="14" font-weight="800">Example: Mountain Pass and Bayan Obo become visual architectures.</text>
  </g>
</svg>
