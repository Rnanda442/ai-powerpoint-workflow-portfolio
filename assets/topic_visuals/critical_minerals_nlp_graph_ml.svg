<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Critical minerals NLP to graph ML diagram</title>
  <desc id="desc">Visual explanation of how Adobe-style sketches and scientific text can feed SciBERT, MatSciBERT, GraphSAGE, and R-GCN for critical-mineral knowledge graphs.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="graph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#f7f8f4"/>
  <text x="50" y="52" fill="#0f172a" font-family="Arial, sans-serif" font-size="31" font-weight="800">Critical-mineral sketches -> scientific text -> graph ML</text>
  <text x="52" y="84" fill="#475569" font-family="Arial, sans-serif" font-size="15">Use the Adobe sketches as visual anchors, then use scientific language models and graph neural networks to create reviewable candidate relationships.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="126" width="245" height="405" rx="18" fill="url(#paper)" stroke="#cbd5e1"/>
    <text x="74" y="164" fill="#0f766e" font-family="Arial, sans-serif" font-size="21" font-weight="800">1. Adobe sketch close-up</text>
    <rect x="76" y="196" width="194" height="146" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="130" cy="259" r="32" fill="#fde68a" stroke="#b45309" stroke-width="3"/>
    <circle cx="196" cy="252" r="24" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <path d="M132 260 C160 219, 178 221, 197 252" fill="none" stroke="#334155" stroke-width="4"/>
    <path d="M118 281 C158 313, 197 300, 218 270" fill="none" stroke="#0f766e" stroke-width="4"/>
    <text x="92" y="374" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Visual clues</text>
    <text x="92" y="397" fill="#475569" font-family="Arial, sans-serif" font-size="13">deposit shape</text>
    <text x="92" y="417" fill="#475569" font-family="Arial, sans-serif" font-size="13">mineral zone</text>
    <text x="92" y="437" fill="#475569" font-family="Arial, sans-serif" font-size="13">host context</text>
    <text x="92" y="457" fill="#475569" font-family="Arial, sans-serif" font-size="13">interpretation question</text>
  </g>

  <path d="M310 330 H358" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="370" y="126" width="300" height="405" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="397" y="164" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="21" font-weight="800">2. SciBERT / MatSciBERT</text>
    <text x="397" y="190" fill="#475569" font-family="Arial, sans-serif" font-size="13">Language models read scientific sentences and</text>
    <text x="397" y="209" fill="#475569" font-family="Arial, sans-serif" font-size="13">tag domain words before graph edges are built.</text>

    <rect x="397" y="240" width="246" height="95" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="415" y="270" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="15" font-weight="800">SciBERT</text>
    <text x="415" y="294" fill="#334155" font-family="Arial, sans-serif" font-size="13">scientific text vocabulary</text>
    <text x="415" y="314" fill="#334155" font-family="Arial, sans-serif" font-size="13">papers, abstracts, claims, methods</text>

    <rect x="397" y="358" width="246" height="95" rx="12" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="415" y="388" fill="#134e4a" font-family="Arial, sans-serif" font-size="15" font-weight="800">MatSciBERT</text>
    <text x="415" y="412" fill="#334155" font-family="Arial, sans-serif" font-size="13">materials-domain language</text>
    <text x="415" y="432" fill="#334155" font-family="Arial, sans-serif" font-size="13">mineral names, formulas, phases</text>

    <rect x="407" y="472" width="70" height="30" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="423" y="492" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="12" font-weight="800">mineral</text>
    <rect x="486" y="472" width="72" height="30" rx="8" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="504" y="492" fill="#134e4a" font-family="Arial, sans-serif" font-size="12" font-weight="800">host</text>
    <rect x="568" y="472" width="65" height="30" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="582" y="492" fill="#92400e" font-family="Arial, sans-serif" font-size="12" font-weight="800">stage</text>
  </g>

  <path d="M686 330 H734" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="746" y="126" width="208" height="405" rx="18" fill="url(#graph)" stroke="#cbd5e1"/>
    <text x="774" y="164" fill="#0f172a" font-family="Arial, sans-serif" font-size="21" font-weight="800">3. Review graph</text>
    <text x="774" y="190" fill="#475569" font-family="Arial, sans-serif" font-size="13">Nodes and typed edges stay</text>
    <text x="774" y="209" fill="#475569" font-family="Arial, sans-serif" font-size="13">visible for expert audit.</text>

    <circle cx="818" cy="294" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle cx="876" cy="247" r="26" fill="#ccfbf1" stroke="#0f766e" stroke-width="3"/>
    <circle cx="890" cy="350" r="27" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <circle cx="809" cy="401" r="23" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>

    <path d="M837 277 L855 263" stroke="#334155" stroke-width="3"/>
    <path d="M835 308 L866 338" stroke="#334155" stroke-width="3"/>
    <path d="M875 375 L827 392" stroke="#334155" stroke-width="3"/>
    <path d="M879 273 L887 323" stroke="#334155" stroke-width="3"/>

    <text x="782" y="461" fill="#334155" font-family="Arial, sans-serif" font-size="13" font-weight="700">Edge types</text>
    <text x="782" y="484" fill="#475569" font-family="Arial, sans-serif" font-size="12">hosted by</text>
    <text x="850" y="484" fill="#475569" font-family="Arial, sans-serif" font-size="12">contains</text>
    <text x="782" y="504" fill="#475569" font-family="Arial, sans-serif" font-size="12">co-occurs</text>
    <text x="850" y="504" fill="#475569" font-family="Arial, sans-serif" font-size="12">evidence for</text>
  </g>

  <path d="M972 330 H1018" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="1030" y="126" width="118" height="178" rx="16" fill="#ffffff" stroke="#99f6e4"/>
    <text x="1054" y="161" fill="#134e4a" font-family="Arial, sans-serif" font-size="18" font-weight="800">Graph</text>
    <text x="1056" y="184" fill="#134e4a" font-family="Arial, sans-serif" font-size="18" font-weight="800">SAGE</text>
    <text x="1045" y="214" fill="#475569" font-family="Arial, sans-serif" font-size="12">samples local</text>
    <text x="1045" y="232" fill="#475569" font-family="Arial, sans-serif" font-size="12">neighbors and</text>
    <text x="1045" y="250" fill="#475569" font-family="Arial, sans-serif" font-size="12">aggregates node</text>
    <text x="1045" y="268" fill="#475569" font-family="Arial, sans-serif" font-size="12">features</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1030" y="352" width="118" height="179" rx="16" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="1055" y="387" fill="#4c1d95" font-family="Arial, sans-serif" font-size="18" font-weight="800">R-GCN</text>
    <text x="1045" y="417" fill="#475569" font-family="Arial, sans-serif" font-size="12">uses different</text>
    <text x="1045" y="435" fill="#475569" font-family="Arial, sans-serif" font-size="12">weights for</text>
    <text x="1045" y="453" fill="#475569" font-family="Arial, sans-serif" font-size="12">different edge</text>
    <text x="1045" y="471" fill="#475569" font-family="Arial, sans-serif" font-size="12">relations</text>
  </g>

  <g>
    <rect x="70" y="572" width="1060" height="58" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="94" y="607" fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="800">Why use them here:</text>
    <text x="224" y="607" fill="#334155" font-family="Arial, sans-serif" font-size="15">SciBERT/MatSciBERT propose terms, GraphSAGE generalizes to new nodes, and R-GCN respects relation types before any edge becomes a claim.</text>
  </g>
</svg>
