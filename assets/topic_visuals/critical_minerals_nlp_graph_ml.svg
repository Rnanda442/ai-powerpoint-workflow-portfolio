<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Critical minerals NLP and graph model mechanics</title>
  <desc id="desc">Readable processing-style diagram showing how REE sketches and scientific text move through SciBERT, MatSciBERT, GraphSAGE, and R-GCN before human graph review.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .panel { filter: url(#shadow); }
      .card-title { fill: #0f172a; font-size: 23px; font-weight: 800; }
      .small { fill: #475569; font-size: 15px; }
      .label { fill: #334155; font-size: 13px; font-weight: 700; }
      .tiny { fill: #64748b; font-size: 12px; }
      .chip-text { font-size: 13px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#f8fafc"/>
  <text x="58" y="54" fill="#0f172a" font-size="34" font-weight="900">Topic two model mechanics: text encoders + graph neural nets</text>
  <text x="60" y="86" class="small">The website should show how model parts work, then route every AI-suggested link into source review.</text>

  <g class="panel">
    <rect x="54" y="128" width="302" height="500" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="82" y="168" class="card-title">1. One readable graph view</text>
    <text x="82" y="196" class="small">Redraw the Adobe/Gephi idea</text>
    <text x="82" y="217" class="small">so the relationships are legible.</text>

    <rect x="88" y="248" width="232" height="250" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
    <path d="M205 365 C170 318, 145 286, 126 278" fill="none" stroke="#0f766e" stroke-width="5"/>
    <path d="M205 365 C242 315, 268 290, 292 286" fill="none" stroke="#2563eb" stroke-width="5"/>
    <path d="M205 365 C160 395, 139 427, 127 457" fill="none" stroke="#d97706" stroke-width="5"/>
    <path d="M205 365 C239 397, 268 424, 288 457" fill="none" stroke="#7c3aed" stroke-width="5"/>
    <circle cx="205" cy="365" r="36" fill="#0f172a"/>
    <text x="177" y="370" fill="#ffffff" font-size="14" font-weight="800">Bayan</text>
    <text x="184" y="388" fill="#ffffff" font-size="14" font-weight="800">Obo</text>
    <circle cx="126" cy="278" r="29" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text x="99" y="283" fill="#1e3a8a" font-size="12" font-weight="800">bastnasite</text>
    <circle cx="292" cy="286" r="29" fill="#ccfbf1" stroke="#0f766e" stroke-width="4"/>
    <text x="270" y="291" fill="#134e4a" font-size="12" font-weight="800">host rock</text>
    <circle cx="127" cy="457" r="29" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <text x="102" y="462" fill="#92400e" font-size="12" font-weight="800">fluid event</text>
    <circle cx="288" cy="457" r="29" fill="#f5f3ff" stroke="#7c3aed" stroke-width="4"/>
    <text x="267" y="462" fill="#4c1d95" font-size="12" font-weight="800">evidence</text>

    <rect x="86" y="526" width="240" height="60" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="104" y="552" class="label">Visual rule</text>
    <text x="104" y="573" class="tiny">Use one large source graph, not three tiny repeats.</text>
  </g>

  <path d="M378 378 H438" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <g class="panel">
    <rect x="460" y="128" width="408" height="500" rx="20" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="488" y="168" class="card-title">2. Scientific language encoders</text>
    <text x="488" y="196" class="small">They turn text into tagged entities</text>
    <text x="488" y="217" class="small">before a graph edge is proposed.</text>

    <rect x="492" y="254" width="340" height="72" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="514" y="285" fill="#1e3a8a" font-size="18" font-weight="900">SciBERT</text>
    <text x="514" y="308" class="small">scientific vocabulary for papers and captions</text>

    <rect x="492" y="350" width="340" height="72" rx="16" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="514" y="381" fill="#134e4a" font-size="18" font-weight="900">MatSciBERT</text>
    <text x="514" y="404" class="small">materials vocabulary for minerals and formulas</text>

    <rect x="500" y="458" width="92" height="34" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="520" y="480" fill="#1e3a8a" class="chip-text">mineral</text>
    <rect x="604" y="458" width="78" height="34" rx="10" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="626" y="480" fill="#134e4a" class="chip-text">host</text>
    <rect x="694" y="458" width="80" height="34" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="713" y="480" fill="#92400e" class="chip-text">stage</text>

    <rect x="515" y="526" width="285" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="536" y="557" fill="#334155" font-size="15">tokens -> transformer layers -> entity tags</text>
  </g>

  <path d="M890 378 H950" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <g class="panel">
    <rect x="972" y="128" width="354" height="500" rx="20" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="1000" y="168" class="card-title">3. Graph neural networks</text>
    <text x="1000" y="196" class="small">They score candidate links while</text>
    <text x="1000" y="217" class="small">keeping edge types visible.</text>

    <rect x="1002" y="250" width="294" height="132" rx="18" fill="#fffbeb" stroke="#fbbf24"/>
    <text x="1026" y="282" fill="#92400e" font-size="19" font-weight="900">GraphSAGE</text>
    <circle cx="1084" cy="330" r="25" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <circle cx="1041" cy="340" r="18" fill="#ffffff" stroke="#d97706" stroke-width="3"/>
    <circle cx="1130" cy="304" r="18" fill="#ffffff" stroke="#d97706" stroke-width="3"/>
    <circle cx="1144" cy="354" r="18" fill="#ffffff" stroke="#d97706" stroke-width="3"/>
    <path d="M1060 336 L1041 340M1105 318 L1130 304M1108 344 L1144 354" stroke="#92400e" stroke-width="3"/>
    <text x="1176" y="318" class="tiny">sample neighbors</text>
    <text x="1176" y="338" class="tiny">aggregate features</text>
    <text x="1176" y="358" class="tiny">rank new node</text>

    <rect x="1002" y="420" width="294" height="132" rx="18" fill="#f5f3ff" stroke="#a78bfa"/>
    <text x="1026" y="452" fill="#4c1d95" font-size="19" font-weight="900">R-GCN</text>
    <circle cx="1066" cy="501" r="22" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
    <circle cx="1162" cy="470" r="20" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <circle cx="1162" cy="532" r="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <path d="M1087 493 L1143 477" stroke="#2563eb" stroke-width="4"/>
    <path d="M1087 509 L1143 526" stroke="#0f766e" stroke-width="4"/>
    <text x="1192" y="475" class="tiny">contains</text>
    <text x="1192" y="535" class="tiny">hosted by</text>
  </g>

  <rect x="84" y="672" width="1236" height="54" rx="16" fill="#0f172a"/>
  <text x="112" y="706" fill="#ffffff" font-size="17" font-weight="800">Presentation takeaway:</text>
  <text x="304" y="706" fill="#dbeafe" font-size="17">the model suggests entities and links; the geologist accepts, edits, or rejects the graph before it becomes a claim.</text>
</svg>
