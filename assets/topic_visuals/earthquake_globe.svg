<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="Earthquake globe and sound visualization">
  <rect width="720" height="300" rx="18" fill="#020617"/>
  <circle cx="214" cy="150" r="96" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <path d="M120 140c50-26 110-22 188 8M148 90c36 28 76 112 94 160M112 174c64 14 126 10 198-12" fill="none" stroke="#1e40af" stroke-width="3"/>
  <circle cx="172" cy="118" r="8" fill="#f97316">
    <animate attributeName="r" values="6;11;6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="236" cy="176" r="12" fill="#ef4444">
    <animate attributeName="r" values="9;15;9" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="118" r="6" fill="#fde047">
    <animate attributeName="r" values="4;9;4" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="214" r="5" fill="#f43f5e">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <path d="M390 88c34 24 34 100 0 124M426 68c52 44 52 148 0 192M462 46c72 64 72 188 0 252" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.75">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <rect x="502" y="64" width="162" height="138" rx="12" fill="#111827" stroke="#334155" stroke-width="3"/>
  <text x="526" y="100" font-family="Consolas, monospace" font-size="18" fill="#7dd3fc">lat, lon</text>
  <text x="526" y="132" font-family="Consolas, monospace" font-size="18" fill="#fca5a5">depth</text>
  <text x="526" y="164" font-family="Consolas, monospace" font-size="18" fill="#fde68a">magnitude</text>
  <text x="78" y="272" font-family="Arial" font-size="22" font-weight="700" fill="#e0f2fe">USGS events -> 3D globe -> sound</text>
</svg>
