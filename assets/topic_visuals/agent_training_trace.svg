<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="AI agent training workflow trace">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.58" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="42" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#94a3b8">
    <path d="M80 140h1040M80 260h1040M80 380h1040M80 500h1040M230 80v560M460 80v560M690 80v560M920 80v560"/>
  </g>
  <g fill="#0f172a" stroke="#38bdf8" stroke-width="3">
    <rect x="85" y="105" width="265" height="175" rx="24"/>
    <rect x="468" y="90" width="260" height="190" rx="24"/>
    <rect x="845" y="105" width="270" height="175" rx="24"/>
  </g>
  <g fill="#e0f2fe" font-family="Inter, Arial, sans-serif">
    <text x="118" y="155" font-size="26" font-weight="700">Screen recording</text>
    <text x="118" y="196" font-size="18">QGIS / Vagon / files</text>
    <text x="500" y="140" font-size="26" font-weight="700">Action trace</text>
    <text x="500" y="181" font-size="18">clicks, prompts, recovery</text>
    <text x="878" y="155" font-size="26" font-weight="700">Rubric check</text>
    <text x="878" y="196" font-size="18">human-reviewed output</text>
  </g>
  <path d="M225 315C350 385 370 230 508 340C650 454 706 214 855 325C940 388 1015 386 1080 330" fill="none" stroke="url(#trace)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <g fill="#2dd4bf" filter="url(#glow)">
    <circle cx="225" cy="315" r="13"/>
    <circle cx="508" cy="340" r="13"/>
    <circle cx="855" cy="325" r="13"/>
    <circle cx="1080" cy="330" r="13"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#cbd5e1">
    <text x="144" y="450">messy human process</text>
    <text x="440" y="525">labeled steps</text>
    <text x="710" y="475">agent replay</text>
    <text x="890" y="535">pass / fail / retry</text>
  </g>
  <g transform="translate(122 530)">
    <rect width="950" height="80" rx="26" fill="rgba(15,23,42,0.72)" stroke="#2dd4bf"/>
    <text x="34" y="35" font-size="20" font-weight="700" fill="#f8fafc" font-family="Inter, Arial, sans-serif">Better overview replacement</text>
    <text x="34" y="61" font-size="17" fill="#cbd5e1" font-family="Inter, Arial, sans-serif">Use the actual workflow idea instead of unrelated Structural Explorer screenshots.</text>
  </g>
</svg>
